<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Agrox</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 1rem 0;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>
<body class="bg-light">
    <div class="login-wrap">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                    <div class="card login-card shadow-sm border-0 mx-auto">
                        <div class="card-body p-4 p-md-5">
                            <h1 class="h4 text-center mb-1">Entrar</h1>
                            <p class="text-muted text-center small mb-4">Acesse com suas credenciais</p>

                            <div id="loginErro" class="alert alert-danger d-none py-2 small" role="alert"></div>

                            <form id="formLogin" novalidate>
                                <div class="form-group">
                                    <label for="usuario">Usuário</label>
                                    <input type="text" class="form-control" id="usuario" name="usuario" autocomplete="username" required autofocus>
                                </div>
                                <div class="form-group">
                                    <label for="senha">Senha</label>
                                    <input type="password" class="form-control" id="senha" name="senha" autocomplete="current-password" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-block" id="btnEntrar">Entrar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
    <script>
        (function () {
            var USUARIO_OK = 'admin';
            var SENHA_OK = '123';

            var form = document.getElementById('formLogin');
            var erro = document.getElementById('loginErro');
            var btn = document.getElementById('btnEntrar');

            function mostrarErro(msg) {
                erro.textContent = msg;
                erro.classList.remove('d-none');
            }

            function esconderErro() {
                erro.classList.add('d-none');
                erro.textContent = '';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                esconderErro();

                var usuario = document.getElementById('usuario').value.trim();
                var senha = document.getElementById('senha').value;

                if (!usuario || !senha) {
                    mostrarErro('Preencha usuário e senha.');
                    return;
                }

                if (usuario === USUARIO_OK && senha === SENHA_OK) {
                    btn.disabled = true;
                    btn.textContent = 'Entrando…';
                    try {
                        sessionStorage.setItem('agrox_usuario', usuario);
                    } catch (err) {}
                    window.location.href = 'dashboard.html';
                    return;
                }

                mostrarErro('Usuário ou senha incorretos.');
            });
        })();
    </script>
</body>
</html>
